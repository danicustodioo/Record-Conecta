<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Record Conecta — Painel Interno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- PWA (app instalável no celular e desktop) -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#142840">
<link rel="icon" type="image/png" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Record Conecta">
<style>
:root{
  --navy:#142840; --navy-2:#1c3454; --gold:#C9AF74; --gold-d:#b2955a;
  --cream:#F6F2EA; --ink:#243447; --muted:#6b7a8d; --line:#e5e2d8;
  --card:#ffffff; --bg:#f3f1ea; --ok:#2e9e6b; --warn:#e0a032; --danger:#d1553f;
  --shadow:0 1px 3px rgba(20,40,64,.08),0 6px 24px rgba(20,40,64,.06);
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
h1,h2,h3,.serif{font-family:'Playfair Display',Georgia,serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:inherit}
.hidden{display:none!important}

/* ---------- LOGIN ---------- */
#login{position:fixed;inset:0;background:radial-gradient(1200px 600px at 70% -10%,#1c3454,#142840);display:flex;align-items:center;justify-content:center;padding:calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));z-index:50;overflow:auto}
.login-card{background:var(--cream);border-radius:20px;box-shadow:0 30px 80px rgba(0,0,0,.35);width:100%;max-width:400px;padding:38px 34px;text-align:center}
.logo-mark{width:70px;height:70px;margin:0 auto 14px}
.login-card h1{font-size:26px;letter-spacing:6px;color:var(--navy);font-weight:700}
.login-card .sub{color:var(--gold-d);letter-spacing:9px;font-size:12px;font-weight:600;margin-top:2px}
.login-card p.hint{color:var(--muted);font-size:13px;margin:16px 0 22px}
.field{text-align:left;margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
.field input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;background:#fff}
.field input:focus{outline:none;border-color:var(--gold)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:10px;font-weight:600;font-size:14px;transition:.15s}
.btn-primary{background:var(--navy);color:#fff;width:100%}
.btn-primary:hover{background:var(--navy-2)}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-gold:hover{background:var(--gold-d)}
.btn-ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn-ghost:hover{border-color:var(--gold)}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:8px}
.btn-danger{background:#fdece9;color:var(--danger)}
.login-err{color:var(--danger);font-size:13px;margin-top:12px;min-height:18px}

/* ---------- APP SHELL ---------- */
#app{display:flex;min-height:100vh}
#sidebar{width:250px;background:var(--navy);color:#dfe6ef;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:30;padding-top:env(safe-area-inset-top)}
.brand{padding:22px 20px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .logo-mark{width:40px;height:40px;margin:0}
.brand b{font-family:'Playfair Display',serif;font-size:16px;letter-spacing:3px;color:#fff;display:block;line-height:1}
.brand span{font-size:9px;letter-spacing:5px;color:var(--gold)}
nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 14px;border-radius:10px;color:#c2cad6;font-size:14px;font-weight:500;text-align:left;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--gold);color:var(--navy);font-weight:600}
.nav-item .ic{width:20px;text-align:center;font-size:16px}
.nav-sec{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#7d8ba0;padding:14px 14px 6px;font-weight:600}
.side-foot{padding:14px;border-top:1px solid rgba(255,255,255,.08)}
.userbox{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.userbox .nm{font-size:13px;font-weight:600;color:#fff;line-height:1.2}
.userbox .rl{font-size:11px;color:var(--gold)}

#main{flex:1;margin-left:250px;min-width:0;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--line);padding:16px 26px;padding-top:calc(16px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.topbar h2{font-size:20px;color:var(--navy)}
.topbar .tsub{font-size:12px;color:var(--muted)}
.content{padding:26px;max-width:1200px;width:100%}
#menuBtn{display:none;font-size:22px;color:var(--navy)}

/* ---------- CARDS / GRID ---------- */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:24px}
.metric{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border-left:4px solid var(--gold)}
.metric .v{font-family:'Playfair Display',serif;font-size:32px;color:var(--navy);line-height:1}
.metric .l{font-size:13px;color:var(--muted);margin-top:6px}
.grid{display:grid;gap:16px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
.card h3{font-size:17px;color:var(--navy);margin-bottom:4px}
.card .card-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.section-head h3{font-size:18px;color:var(--navy)}

.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:#eef1f5;color:var(--muted)}
.chip.dep-contabil{background:#e7f0ff;color:#2b5aa8}
.chip.dep-fiscal{background:#e9f7ee;color:#2e7d4f}
.chip.dep-pessoal{background:#fdf0e6;color:#b46b1e}
.chip.dep-gerencia{background:#efe9f7;color:#6a4ba8}
.chip.dep-paralegal{background:#fce9ef;color:#a83a63}
.chip.dep-todos{background:#eae6da;color:#7a6a3f}
.chip.pri-alta{background:#fdece9;color:var(--danger)}
.chip.pri-media{background:#fdf3e0;color:#b8791a}
.chip.pri-baixa{background:#eef1f5;color:var(--muted)}
.chip.st-pendente{background:#fdece9;color:var(--danger)}
.chip.st-em_andamento{background:#fdf3e0;color:#b8791a}
.chip.st-concluida{background:#e6f5ee;color:var(--ok)}
.chip.tp-positivo{background:#e6f5ee;color:var(--ok)}
.chip.tp-melhoria{background:#fdf3e0;color:#b8791a}
.chip.tp-geral{background:#eef1f5;color:var(--muted)}

.item{border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:12px;background:#fff}
.item:last-child{margin-bottom:0}
.item .it-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.item .it-title{font-weight:600;color:var(--navy);font-size:15px}
.item .it-meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:12px;flex-wrap:wrap}
.item .it-body{font-size:13.5px;color:var(--ink);margin-top:10px;line-height:1.5}
.item .it-body b{color:var(--navy)}
.row-actions{display:flex;gap:6px;flex-shrink:0}
.icon-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:15px}
.icon-btn:hover{background:#f1f0ea;color:var(--navy)}
.empty{text-align:center;color:var(--muted);padding:34px 16px;font-size:14px}
.empty .em-ic{font-size:34px;opacity:.4;display:block;margin-bottom:8px}

/* filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filters select,.filters input{padding:8px 12px;border:1px solid var(--line);border-radius:9px;background:#fff}

/* ---------- CALENDAR ---------- */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-head .mname{font-family:'Playfair Display',serif;font-size:20px;color:var(--navy);text-transform:capitalize}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;padding-bottom:4px}
.cal-cell{background:#fff;border:1px solid var(--line);border-radius:10px;min-height:96px;padding:6px;display:flex;flex-direction:column;gap:3px;overflow:hidden}
.cal-cell.other{background:#faf9f5;opacity:.55}
.cal-cell.today{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,175,116,.35)}
.cal-cell .dn{font-size:12px;font-weight:600;color:var(--muted);align-self:flex-end}
.cal-cell.today .dn{color:var(--gold-d)}
.cal-ev{font-size:11px;padding:2px 6px;border-radius:6px;color:#fff;background:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-ev.reuniao{background:#2b5aa8}.cal-ev.treinamento{background:#2e7d4f}.cal-ev.compromisso{background:#b46b1e}.cal-ev.evento{background:#6a4ba8}
.cal-more{font-size:10px;color:var(--muted);padding-left:4px}

/* progress */
.progress{height:8px;background:#ece9df;border-radius:20px;overflow:hidden;margin-top:8px}
.progress > i{display:block;height:100%;background:var(--gold);border-radius:20px}
.tasklist{list-style:none;margin-top:12px}
.tasklist li{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:14px}
.tasklist li:last-child{border-bottom:none}
.tasklist input[type=checkbox]{width:17px;height:17px;accent-color:var(--gold);cursor:pointer}
.tasklist .done{text-decoration:line-through;color:var(--muted)}
.resp-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#eef1f5;color:var(--muted);margin-left:auto}
.resp-tag.Dani{background:#e7f0ff;color:#2b5aa8}.resp-tag[data-r="Marcus V."]{background:#fce9ef;color:#a83a63}

.plano-group{margin-bottom:26px}
.plano-group > h4{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-d);font-weight:700;margin-bottom:12px}
.metrica{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px dashed var(--line)}
.metrica b{color:var(--navy)}

/* subtabs */
.subtabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
.subtab{padding:10px 16px;font-size:14px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
.subtab.active{color:var(--navy);border-bottom-color:var(--gold)}

/* ---------- MODAL ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(20,40,64,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:60}
.modal{background:#fff;border-radius:16px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.3)}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:between;justify-content:space-between}
.modal-h h3{font-size:18px;color:var(--navy)}
.modal-b{padding:20px 22px}
.modal-f{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.form-grid{display:grid;gap:14px}
.form-grid.two{grid-template-columns:1fr 1fr}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--gold)}
.fg textarea{min-height:74px;resize:vertical}

/* toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--navy);color:#fff;padding:11px 18px;border-radius:10px;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,.25);animation:tin .2s}
.toast.err{background:var(--danger)}.toast.ok{background:var(--ok)}
@keyframes tin{from{opacity:0;transform:translateY(8px)}}

#loading{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:90;color:var(--gold);font-family:'Playfair Display',serif;letter-spacing:4px}

/* ---------- RESPONSIVE ---------- */
@media(max-width:860px){
  #sidebar{transform:translateX(-100%);transition:transform .25s;width:240px}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  #menuBtn{display:block}
  .content{padding:16px}
  .topbar{padding:14px 16px}
  .cal-cell{min-height:70px}
  .cal-ev{font-size:0;padding:5px}
  .form-grid.two{grid-template-columns:1fr}
  #scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:25}
}
@media(min-width:861px){#scrim{display:none}}
/* App instalado (tela cheia): folga extra no topo para não encostar na barra de status */
@media (display-mode: standalone), (display-mode: fullscreen){
  .topbar{padding-top:calc(30px + env(safe-area-inset-top, 0px))}
  #sidebar{padding-top:calc(24px + env(safe-area-inset-top, 0px))}
}
/* Barra de navegação inferior (celular) */
#bottomnav{display:none}
@media(max-width:860px){
  #bottomnav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:28;background:#fff;border-top:1px solid var(--line);box-shadow:0 -2px 14px rgba(20,40,64,.07);padding-bottom:env(safe-area-inset-bottom, 0px)}
  .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px 7px;font-size:10px;font-weight:600;color:var(--muted)}
  .bn-item .bn-ic{font-size:19px;line-height:1}
  .bn-item.active{color:var(--gold-d)}
  .content{padding-bottom:calc(74px + env(safe-area-inset-bottom, 0px))}
}
</style>
</head>
<body>

<div id="loading">CARREGANDO…</div>

<!-- ================= LOGIN ================= -->
<div id="login" class="hidden">
  <form class="login-card" id="loginForm">
    <img src="logo-symbol.png" alt="Record" style="width:auto;height:88px;display:block;margin:0 auto 16px">
    <h1>RECORD</h1>
    <div class="sub">CONECTA</div>
    <p class="hint">Painel interno do escritório</p>
    <div class="field"><label>E-mail</label><input type="email" id="li_email" autocomplete="username" required placeholder="voce@recordconecta.com.br"></div>
    <div class="field"><label>Senha</label><input type="password" id="li_pass" autocomplete="current-password" required placeholder="••••••••"></div>
    <button type="submit" class="btn btn-primary" id="li_btn">Entrar</button>
    <div class="login-err" id="li_err"></div>
  </form>
</div>

<!-- ================= APP ================= -->
<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="brand">
      <img src="logo-symbol-light.png" alt="Record" style="width:auto;height:44px">
      <div><b>RECORD</b><span>CONECTA</span></div>
    </div>
    <nav id="nav">
      <div class="nav-sec">Geral</div>
      <button class="nav-item" data-view="inicio"><span class="ic">◈</span> Início</button>
      <button class="nav-item" data-view="calendario"><span class="ic">▦</span> Calendário</button>
      <button class="nav-item" data-view="reunioes"><span class="ic">◷</span> Reuniões</button>
      <button class="nav-item" data-view="treinamentos"><span class="ic">✦</span> Treinamentos</button>
      <button class="nav-item" data-view="resultados"><span class="ic">✎</span> Resultados</button>
      <div class="nav-sec">Pessoal</div>
      <button class="nav-item" data-view="agenda"><span class="ic">🗓</span> Minha Agenda</button>
      <button class="nav-item" data-view="setor"><span class="ic">◐</span> <span id="nav-setor-label">Meu Setor</span></button>
      <div class="nav-sec ger-only hidden">Gerência</div>
      <button class="nav-item ger-only hidden" data-view="gerencia"><span class="ic">★</span> Painel de Gerência</button>
    </nav>
    <div class="side-foot">
      <div class="userbox"><div class="avatar" id="uAvatar">?</div><div><div class="nm" id="uName">—</div><div class="rl" id="uRole">—</div></div></div>
      <button class="btn btn-ghost btn-sm" style="width:100%" id="logoutBtn">Sair</button>
    </div>
  </aside>

  <div id="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button id="menuBtn">☰</button>
        <div><h2 id="viewTitle">Início</h2><div class="tsub" id="viewSub"></div></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
        <button class="btn btn-gold btn-sm hidden" id="installBtn" title="Instalar aplicativo">⬇ Instalar app</button>
        <button class="btn btn-ghost btn-sm hidden" id="notifBtn" title="Ativar notificações">🔔 Ativar avisos</button>
        <button class="btn btn-ghost btn-sm" id="refreshBtn" title="Atualizar">⟳ Atualizar</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>

  <nav id="bottomnav">
    <button class="bn-item" data-view="inicio"><span class="bn-ic">◈</span>Início</button>
    <button class="bn-item" data-view="calendario"><span class="bn-ic">▦</span>Calendário</button>
    <button class="bn-item" data-view="agenda"><span class="bn-ic">🗓</span>Agenda</button>
    <button class="bn-item" data-view="setor"><span class="bn-ic">◐</span>Setor</button>
    <button class="bn-item" id="bnMenu"><span class="bn-ic">☰</span>Menu</button>
  </nav>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   CONFIG
============================================================ */
const SUPABASE_URL = "https://cwrafyrozbbtbzwolhwy.supabase.co";
const SUPABASE_KEY = "sb_publishable_sZcYJaEapXNnTi9_TqCSew_2Zidi8pI";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DEPTS = {contabil:'Contábil',fiscal:'Fiscal',pessoal:'Pessoal',gerencia:'Gerência',paralegal:'Paralegal'};
const DEPTS_TODOS = Object.assign({todos:'Todos os setores'}, DEPTS);
const TIPO_EV = {reuniao:'Reunião',treinamento:'Treinamento',compromisso:'Compromisso',evento:'Evento'};
const PRAZO = {curto:'Curto prazo',medio:'Médio prazo',longo:'Longo prazo'};
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DOW = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

const state = { profile:null, view:'inicio', calRef:new Date(), gerSub:'setores', channel:null };

/* ============================================================
   HELPERS
============================================================ */
const $ = s=>document.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function toast(msg,type=''){const t=el('div','toast '+type,esc(msg));$('#toast').appendChild(t);setTimeout(()=>t.remove(),3200);}
function initials(n){return (n||'?').trim().split(/\s+/).slice(0,2).map(x=>x[0]).join('').toUpperCase();}
function fmtDate(d){if(!d)return '';const x=new Date(d);return x.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtDateTime(d){if(!d)return '';const x=new Date(d);return x.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' '+x.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function fmtTime(d){if(!d)return '';return new Date(d).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function depChip(d){return `<span class="chip dep-${d}">${DEPTS_TODOS[d]||d}</span>`;}
function isGer(){return state.profile && state.profile.is_gerencia;}
function toInputDT(iso){if(!iso)return '';const d=new Date(iso);const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;}

/* ============================================================
   AUTH
============================================================ */
$('#loginForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const btn=$('#li_btn'); btn.disabled=true; btn.textContent='Entrando…'; $('#li_err').textContent='';
  const {error} = await sb.auth.signInWithPassword({email:$('#li_email').value.trim(),password:$('#li_pass').value});
  if(error){ $('#li_err').textContent = error.message.includes('Invalid')?'E-mail ou senha incorretos.':error.message; btn.disabled=false; btn.textContent='Entrar'; return; }
  await boot();
});
$('#logoutBtn').addEventListener('click', async ()=>{ await sb.auth.signOut(); location.reload(); });

async function boot(){
  $('#loading').classList.remove('hidden');
  const {data:{session}} = await sb.auth.getSession();
  if(!session){ $('#loading').classList.add('hidden'); $('#login').classList.remove('hidden'); $('#app').classList.add('hidden'); return; }
  // carrega profile
  const {data:prof,error} = await sb.from('profiles').select('*').eq('id',session.user.id).single();
  if(error||!prof){ toast('Não foi possível carregar seu perfil.','err'); await sb.auth.signOut(); location.reload(); return; }
  state.profile = prof;
  $('#login').classList.add('hidden'); $('#app').classList.remove('hidden');
  $('#uName').textContent = prof.nome; $('#uRole').textContent = (prof.is_gerencia?'Gerência':DEPTS[prof.departamento]||prof.departamento);
  $('#uAvatar').textContent = initials(prof.nome);
  $('#nav-setor-label').textContent = 'Meu Setor · '+(DEPTS[prof.departamento]||'');
  document.querySelectorAll('.ger-only').forEach(e=>e.classList.toggle('hidden', !prof.is_gerencia));
  setupRealtime();
  updateNotifBtn();
  go('inicio');
  $('#loading').classList.add('hidden');
}

/* ============================================================
   REALTIME (atualiza ao vivo; se indisponível, o refresh cobre)
============================================================ */
function setupRealtime(){
  try{
    if(state.channel) sb.removeChannel(state.channel);
    state.channel = sb.channel('rc-live')
      .on('postgres_changes',{event:'*',schema:'public'}, ()=>{ if(document.visibilityState==='visible') render(); })
      .subscribe();
  }catch(e){}
}
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible' && state.profile) render(); });

/* ============================================================

============================================================ */
function buildAgendaUrl(inp){
  inp=(inp||'').trim();
  if(!inp) return '';
  if(inp.includes('calendar.google.com')){
    // se colaram um <iframe ... src="...">, extrai o src
    const m=inp.match(/src=["']?([^"'\s>]+)/i);
    return m?m[1].replace(/&amp;/g,'&'):inp;
  }
  if(inp.includes('@')) return 'https://calendar.google.com/calendar/embed?src='+encodeURIComponent(inp)+'&ctz=America%2FSao_Paulo&mode=MONTH';
  return inp;
}

async function saveAgenda(raw){
  const url=buildAgendaUrl(raw);
  const {error}=await sb.from('profiles').update({google_agenda_url:url}).eq('id',state.profile.id);
  if(error)return toast(error.message,'err');
  state.profile.google_agenda_url=url;
  toast(url?'Agenda conectada':'Agenda desconectada','ok');
  renderAgenda($('#content'));
}

============================================================ */
async function renderInicio(c){
  loadingCard(c);
  const now=new Date();
  const in7=new Date(now.getTime()+7*864e5);
  const [{data:evs},{data:exigs},{data:proj},{data:tasks}] = await Promise.all([
    sb.from('eventos').select('*').gte('data_inicio',now.toISOString()).order('data_inicio').limit(50),
    sb.from('exigencias').select('*').neq('status','concluida'),
    sb.from('plano_estrategico').select('id'),
    sb.from('plano_tarefas').select('concluida'),
  ]);
  const evList=evs||[];
  const weekEvs=evList.filter(e=>new Date(e.data_inicio)<=in7);
  const treinos=evList.filter(e=>e.tipo==='treinamento').length;
  const doneTasks=(tasks||[]).filter(t=>t.concluida).length;
  const totalTasks=(tasks||[]).length;
  const pct=totalTasks?Math.round(doneTasks/totalTasks*100):0;

  c.innerHTML = `
    <div class="metrics">
      <div class="metric"><div class="v">${weekEvs.length}</div><div class="l">Compromissos nos próximos 7 dias</div></div>
      <div class="metric"><div class="v">${treinos}</div><div class="l">Treinamentos agendados</div></div>
      <div class="metric"><div class="v">${(exigs||[]).length}</div><div class="l">Exigências em aberto ${isGer()?'(escritório)':'(você/seu setor)'}</div></div>
      <div class="metric"><div class="v">${pct}%</div><div class="l">Progresso do plano estratégico</div></div>
    </div>
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(300px,1fr))">
      <div class="card">
        <h3>Próximos compromissos</h3>
        <div class="card-sub">Reuniões, treinamentos e prazos de todos os setores</div>
        <div id="up-events"></div>
      </div>
      <div class="card">
        <h3>Minhas exigências</h3>
        <div class="card-sub">Pendências atribuídas a você ou ao seu setor</div>
        <div id="up-exig"></div>
      </div>
    </div>`;
  const ue=$('#up-events');
  if(!evList.length) ue.innerHTML=emptyBox('Nenhum compromisso futuro programado.','▦');
  else ue.innerHTML = evList.slice(0,7).map(e=>`
    <div class="item"><div class="it-top"><div>
      <div class="it-title">${esc(e.titulo)}</div>
      <div class="it-meta"><span>🗓 ${fmtDateTime(e.data_inicio)}</span>${e.local?`<span>📍 ${esc(e.local)}</span>`:''}<span class="chip tp">${TIPO_EV[e.tipo]}</span></div>
    </div>${depChip(e.departamento)}</div></div>`).join('');
  const uex=$('#up-exig');
  const mine=(exigs||[]).filter(x=> x.profile_id===state.profile.id || (x.profile_id==null && x.departamento===state.profile.departamento) || isGer());
  if(!mine.length) uex.innerHTML=emptyBox('Sem exigências em aberto. 🎉');
  else uex.innerHTML = mine.slice(0,7).map(x=>`
    <div class="item"><div class="it-top"><div>
      <div class="it-title">${esc(x.titulo)}</div>
      <div class="it-meta">${x.prazo?`<span>⏱ ${fmtDate(x.prazo)}</span>`:''}<span class="chip pri-${x.prioridade}">${x.prioridade}</span></div>
    </div><span class="chip st-${x.status}">${x.status.replace('_',' ')}</span></div></div>`).join('');
}

/* ============================================================
   CALENDÁRIO
============================================================ */
async function renderCalendario(c){
  loadingCard(c);
  const ref=state.calRef;
  const y=ref.getFullYear(), m=ref.getMonth();
  const first=new Date(y,m,1), start=new Date(first); start.setDate(1-((first.getDay())));
  const gridStart=new Date(y,m,1); gridStart.setDate(1-first.getDay());
  const gridEnd=new Date(gridStart); gridEnd.setDate(gridStart.getDate()+42);
  const {data:evs}=await sb.from('eventos').select('*').gte('data_inicio',gridStart.toISOString()).lt('data_inicio',gridEnd.toISOString()).order('data_inicio');
  const byDay={};
  (evs||[]).forEach(e=>{const k=new Date(e.data_inicio).toDateString();(byDay[k]=byDay[k]||[]).push(e);});
  const today=new Date().toDateString();

  let cells='';
  for(let i=0;i<42;i++){
    const d=new Date(gridStart); d.setDate(gridStart.getDate()+i);
    const other=d.getMonth()!==m;
    const list=byDay[d.toDateString()]||[];
    const evHtml=list.slice(0,3).map(e=>`<div class="cal-ev ${e.tipo}" data-ev="${e.id}" title="${esc(e.titulo)}">${fmtTime(e.data_inicio)} ${esc(e.titulo)}</div>`).join('')
      +(list.length>3?`<div class="cal-more">+${list.length-3}</div>`:'');
    cells+=`<div class="cal-cell ${other?'other':''} ${d.toDateString()===today?'today':''}"><span class="dn">${d.getDate()}</span>${evHtml}</div>`;
  }
  c.innerHTML=`
    <div class="card">
      <div class="cal-head">
        <button class="btn btn-ghost btn-sm" id="calPrev">‹</button>
        <div class="mname">${MESES[m]} ${y}</div>
        <div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" id="calToday">Hoje</button><button class="btn btn-ghost btn-sm" id="calNext">›</button>
        <button class="btn btn-gold btn-sm" id="calAdd">+ Evento</button></div>
      </div>
      <div class="cal-grid">${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div>
    </div>`;
  $('#calPrev').onclick=()=>{state.calRef=new Date(y,m-1,1);renderCalendario(c);};
  $('#calNext').onclick=()=>{state.calRef=new Date(y,m+1,1);renderCalendario(c);};
  $('#calToday').onclick=()=>{state.calRef=new Date();renderCalendario(c);};
  $('#calAdd').onclick=()=>eventoModal();
  c.querySelectorAll('.cal-ev').forEach(x=>x.onclick=()=>{const e=(evs||[]).find(z=>z.id===x.dataset.ev);if(e)viewEvento(e);});
}

/* ============================================================
   EVENTOS (reuniões / treinamentos)
============================================================ */
async function renderEventos(c,tipo){
  loadingCard(c);
  const {data:evs}=await sb.from('eventos').select('*').eq('tipo',tipo).order('data_inicio',{ascending:false});
  const label = tipo==='reuniao'?'reunião':'treinamento';
  c.innerHTML=`
    <div class="section-head">
      <h3>${tipo==='reuniao'?'Reuniões programadas':'Treinamentos'}</h3>
      <button class="btn btn-gold btn-sm" id="addEv">+ Nova ${label}</button>
    </div>
    <div class="filters">
      <select id="fDep"><option value="">Todos os setores</option>${Object.entries(DEPTS_TODOS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select>
      <select id="fWhen"><option value="fut">Próximos</option><option value="all">Todos</option><option value="past">Passados</option></select>
    </div>
    <div id="evList"></div>`;
  $('#addEv').onclick=()=>eventoModal(null,tipo);
  const draw=()=>{
    const dep=$('#fDep').value, when=$('#fWhen').value, now=Date.now();
    let list=(evs||[]).filter(e=>!dep||e.departamento===dep);
    if(when==='fut') list=list.filter(e=>new Date(e.data_inicio).getTime()>=now-864e5).sort((a,b)=>new Date(a.data_inicio)-new Date(b.data_inicio));
    else if(when==='past') list=list.filter(e=>new Date(e.data_inicio).getTime()<now);
    const box=$('#evList');
    if(!list.length){box.innerHTML=`<div class="card">${emptyBox('Nenhuma '+label+' encontrada.','◷')}</div>`;return;}
    box.innerHTML=list.map(e=>eventoCard(e)).join('');
    box.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{const e=evs.find(z=>z.id===b.dataset.edit);eventoModal(e,tipo);});
    box.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>delRow('eventos',b.dataset.del,'Evento excluído'));
  };
  $('#fDep').onchange=draw; $('#fWhen').onchange=draw; draw();
}

       <div class="fg"><label>Setor</label><select id="m_dep">${Object.entries(DEPTS_TODOS).map(([k,v])=>`<option value="${k}" ${(e?.departamento||'todos')===k?'selected':''}>${v}</option>`).join('')}</select></div>

     </div>
     <div class="fg"><label>Link (opcional)</label><input id="m_link" value="${esc(e?.link||'')}" placeholder="https://meet..."></div>
     <div class="fg"><label>Descrição</label><textarea id="m_desc">${esc(e?.descricao||'')}</textarea></div>
   </div></div>
   <div class="modal-f"><button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button><button class="btn btn-primary btn-sm" id="m_save">Salvar</button></div>`);
  $('#m_save').onclick=async ()=>{
    const rec={titulo:$('#m_tit').value.trim(),tipo:$('#m_tipo').value,departamento:$('#m_dep').value,
      data_inicio:$('#m_ini').value?new Date($('#m_ini').value).toISOString():null,
      data_fim:$('#m_fim').value?new Date($('#m_fim').value).toISOString():null,
      local:$('#m_loc').value.trim(),responsavel:$('#m_resp').value.trim(),link:$('#m_link').value.trim(),descricao:$('#m_desc').value.trim()};

/* ---- Importador do WorkMonitor (Excel/CSV) ---- */
function normName(s){return (s||'').toString().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();}
function loadXLSX(){return new Promise((res,rej)=>{ if(window.XLSX)return res(window.XLSX);
  const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
  s.onload=()=>res(window.XLSX); s.onerror=()=>rej(new Error('Não foi possível carregar o leitor de Excel.')); document.head.appendChild(s); });}
function splitCSV(line){
  const delim=(line.split(';').length>line.split(',').length)?';':',';
  const out=[]; let cur='',q=false;
  for(let i=0;i<line.length;i++){const c=line[i];
    if(c==='"'){ if(q&&line[i+1]==='"'){cur+='"';i++;} else q=!q; }
    else if(c===delim&&!q){out.push(cur);cur='';}
    else cur+=c;
  }
  out.push(cur); return out.map(s=>s.trim());
}
async function fileToRows(file){
  const nm=file.name.toLowerCase();
  if(nm.endsWith('.csv')){
    const text=await file.text();
    return text.split(/\r?\n/).map(splitCSV).filter(r=>r.length&&r.some(c=>c!==''));
  }
  const XLSX=await loadXLSX();
  const wb=XLSX.read(await file.arrayBuffer(),{type:'array'});
  return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
}
function detectCols(rows){
  for(let i=0;i<Math.min(rows.length,12);i++){
    const cells=(rows[i]||[]).map(c=>normName(c)); const idx={};
    cells.forEach((c,j)=>{
      if(idx.nome==null&&(c.includes('colab')||c==='nome'||c.includes('usuario')||c.includes('canal'))) idx.nome=j;
      if(idx.prod==null&&c.includes('produt')) idx.prod=j;
      if(idx.neu==null&&c.includes('neutr')) idx.neu=j;
      if(idx.ind==null&&c.includes('indev')) idx.ind=j;
      if(idx.ocio==null&&c.includes('ocio')) idx.ocio=j;
      if(idx.score==null&&c.includes('score')) idx.score=j;
    });
    if(idx.nome!=null&&(idx.prod!=null||idx.score!=null||idx.ind!=null)) return {headerRow:i,idx};
  }
  return null;
}
async function importWM(rows){
  const det=detectCols(rows);
  if(!det) return {error:'Não identifiquei as colunas. O arquivo precisa ter uma coluna de colaborador e ao menos uma de produtividade (Produtivas, Indevidas ou Score).'};
  const profs=(window._profs&&window._profs.length)?window._profs:((await sb.from('profiles').select('*')).data||[]);
  const cols=det.idx; let updated=0; const notFound=[];
  for(let i=det.headerRow+1;i<rows.length;i++){
    const r=rows[i]; if(!r||cols.nome==null||!r[cols.nome]) continue;
    const rawName=String(r[cols.nome]).replace(/#\d+.*$/,'').split('\n')[0].trim();
    const nm=normName(rawName); if(!nm) continue;
    let p=profs.find(x=>normName(x.nome)===nm);
    if(!p){ const b=nm.split(' '); p=profs.find(x=>{const a=normName(x.nome).split(' ');return a[0]===b[0]&&a[a.length-1]===b[b.length-1];}); }
    if(!p){ notFound.push(rawName); continue; }
    const val=k=>cols[k]!=null?String(r[cols[k]]).trim():'';
    const metricas=[
      {label:'Produtivas %',valor:val('prod'),meta:'70%'},
      {label:'Neutras %',valor:val('neu'),meta:''},
      {label:'Indevidas %',valor:val('ind'),meta:'0%'},
      {label:'Ócio',valor:val('ocio'),meta:''},
      {label:'Score',valor:val('score'),meta:''},
    ].filter(m=>m.valor!=='');
    if(!metricas.length){ continue; }
    const rec={profile_id:p.id,departamento:p.departamento,periodo:'Importado '+new Date().toLocaleDateString('pt-BR'),titulo:'Produtividade (WorkMonitor)',metricas,observacoes:'Importado automaticamente do WorkMonitor.'};
    const {data:ex}=await sb.from('relatorios_performance').select('id').eq('profile_id',p.id).eq('titulo','Produtividade (WorkMonitor)').limit(1);
    if(ex&&ex.length) await sb.from('relatorios_performance').update(rec).eq('id',ex[0].id);
    else await sb.from('relatorios_performance').insert(rec);
    updated++;
  }
  return {updated,notFound};
}
function importWMModal(){
  openModal(`<div class="modal-h"><h3>Importar produtividade (WorkMonitor)</h3></div>
    <div class="modal-b">
      <div class="card-sub" style="margin-bottom:12px;line-height:1.5">No WorkMonitor, <b>exporte o relatório</b> (Excel ou CSV) da equipe. Depois selecione o arquivo abaixo — o painel preenche a produtividade de cada colaborador automaticamente, encontrando pelo nome.</div>
      <div class="fg"><label>Arquivo exportado (.xlsx, .xls ou .csv)</label><input type="file" id="wm_file" accept=".csv,.xlsx,.xls"></div>
      <div id="wm_status" style="margin-top:12px;font-size:13px;color:var(--muted)"></div>
    </div>
    <div class="modal-f"><button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button><button class="btn btn-primary btn-sm" id="wm_go">Importar</button></div>`);
  $('#wm_go').onclick=async ()=>{
    const f=$('#wm_file').files[0]; if(!f)return toast('Selecione o arquivo exportado.','err');
    $('#wm_status').textContent='Processando…'; $('#wm_go').disabled=true;
    try{
      const rows=await fileToRows(f);
      const res=await importWM(rows);
      if(res.error){ $('#wm_status').textContent=''; toast(res.error,'err'); $('#wm_go').disabled=false; return; }
      closeModal();
      toast(res.updated+' colaborador(es) atualizado(s)'+(res.notFound.length?' · '+res.notFound.length+' não encontrado(s)':''),'ok');
      if(res.notFound.length) setTimeout(()=>toast('Não encontrados: '+res.notFound.slice(0,6).join(', '),''),400);
      drawGer();
    }catch(e){ $('#wm_status').textContent=''; toast('Erro ao ler o arquivo: '+e.message,'err'); $('#wm_go').disabled=false; }
  };
}

async function callFn(payload){
  const {data:{session}}=await sb.auth.getSession();
  const res=await fetch(`${SUPABASE_URL}/functions/v1/gerenciar-colaborador`,{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},body:JSON.stringify(payload)});
  const j=await res.json().catch(()=>({error:'Resposta inválida'}));
  if(!res.ok)throw new Error(j.error||'Erro');
  return j;
}

async function delColab(id){

}

async function saveRow(table,existing,rec,okMsg){
  let error;
  if(existing){({error}=await sb.from(table).update(rec).eq('id',existing.id));}
  else {({error}=await sb.from(table).insert(rec));} // created_by é preenchido pelo banco (default auth.uid())
  if(error){ toast(error.message,'err'); return false; }
  closeModal();toast(okMsg,'ok');render();
  return true;
}
async function delRow(table,id,okMsg,cb){
  if(!confirm('Confirmar exclusão?'))return;
  const {error}=await sb.from(table).delete().eq('id',id);
  if(error)return toast(error.message,'err');
  toast(okMsg,'ok'); cb?cb():render();
}
function openModal(html){
  closeModal();
  const bg=el('div','modal-bg'); bg.id='modalBg';
  const m=el('div','modal',html); bg.appendChild(m);
  bg.onclick=e=>{if(e.target===bg)closeModal();};

}

/* ============================================================
   PWA — instalação e service worker
============================================================ */
if ('serviceWorker' in navigator) {
  let _reloading=false;
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{
    if(_reloading) return; _reloading=true; window.location.reload();
  });
  window.addEventListener('load', async ()=>{
    try{
      // updateViaCache:'none' => o navegador SEMPRE busca o sw.js novo (nunca do cache)
      const reg=await navigator.serviceWorker.register('./sw.js', { updateViaCache:'none' });
      reg.update();
      // verifica atualização ao voltar pro app e de hora em hora
      document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') reg.update(); });
      setInterval(()=>reg.update(), 60*60*1000);
    }catch(e){}
  });
}
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault(); deferredPrompt=e;
  const b=$('#installBtn'); if(b) b.classList.remove('hidden');
});
document.addEventListener('click', async (e)=>{
  if(e.target && e.target.id==='installBtn'){
    if(!deferredPrompt){ toast('Use o menu do navegador → "Instalar app" / "Adicionar à tela inicial".'); return; }
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt=null; $('#installBtn').classList.add('hidden');
  }
});
window.addEventListener('appinstalled', ()=>{ const b=$('#installBtn'); if(b) b.classList.add('hidden'); toast('App instalado! 🎉','ok'); });

/* ============================================================
   NOTIFICAÇÕES PUSH
============================================================ */
const VAPID_PUBLIC='BDID5UvIxg43qZKBBFa3EDyz-5I3Yn46kDFp1uKahiDVTSLEkfabLI3RJxjGwEqymQMGL9JjhICVkGKGnIi4sHI';
function urlB64ToUint8(base64String){
  const padding='='.repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(base64); const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return arr;
}
function notifSupported(){ return ('serviceWorker' in navigator) && ('PushManager' in window) && ('Notification' in window); }
function updateNotifBtn(){
  const b=$('#notifBtn'); if(!b) return;
  const ok = notifSupported() && Notification.permission==='granted';
  b.classList.toggle('hidden', !notifSupported() || ok);
}
async function enableNotifications(){
  if(!notifSupported()){ toast('Seu aparelho não suporta avisos aqui. No iPhone, instale o app primeiro (Compartilhar → Adicionar à Tela de Início).','err'); return; }
  try{
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){ toast('Você precisa permitir as notificações.','err'); return; }
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub) sub=await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:urlB64ToUint8(VAPID_PUBLIC) });
    const j=sub.toJSON();
    const { error }=await sb.from('push_subscriptions').upsert(
      { profile_id:state.profile.id, endpoint:sub.endpoint, subscription:j, user_agent:navigator.userAgent },
      { onConflict:'endpoint' });
    if(error){ toast(error.message,'err'); return; }
    toast('Avisos ativados! 🔔','ok');
    updateNotifBtn();
  }catch(e){ toast('Não foi possível ativar: '+(e.message||e),'err'); }
}
async function notifyEvento(rec){
  try{
    const {data:{session}}=await sb.auth.getSession();
    const quando=rec.data_inicio? new Date(rec.data_inicio).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    const dep = (rec.departamento&&rec.departamento!=='todos') ? ' · '+(DEPTS[rec.departamento]||rec.departamento) : '';
    const tipo = TIPO_EV[rec.tipo]||'Evento';
    await fetch(`${SUPABASE_URL}/functions/v1/notificar-evento`,{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({ title:'📅 '+rec.titulo, body:tipo+(quando?' · '+quando:'')+dep, url:'./', tag:'evento', departamento:rec.departamento||'todos' })});
  }catch(e){ /* não bloqueia */ }
}
document.addEventListener('click',(e)=>{ if(e.target&&e.target.id==='notifBtn') enableNotifications(); });
